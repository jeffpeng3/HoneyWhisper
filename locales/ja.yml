  positiveThreshold: ポジティブ音声のしきい値
  positiveThresholdDesc: 音声として判定する確率のしきい値。値が高いほど感度が低くなります。
  negativeThreshold: ネガティブ音声のしきい値
  negativeThresholdDesc: 無音として判定する確率のしきい値。値が低いほど無音判定が厳密になります。
  minSpeech: 最小音声長 (ミリ秒)
  minSpeechDesc: 録音セグメントを開始するための最小音声長。
  redemption: 無音の許容時間 (ミリ秒)
  redemptionDesc: 音声終了後、録音を停止するまでの待機時間（ポーズを捉えるため）。
